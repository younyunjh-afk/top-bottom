<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1~6월 누계 매출 전체 매장 현황</title>
<style>
:root{
  --bg:#ffffff;
  --card:#ffffff;
  --card2:#f4f5f8;
  --border:#dcdfe6;
  --text:#111111;
  --sub:#444444;
  --blue:#2f6fd1;
  --green:#1f9d63;
  --amber:#b8790f;
  --red:#c93a58;
  --pink1:#ff6fb0;
  --pink2:#a06bff;
  --brand-szm:#2f6fd1;
  --brand-list:#d1478f;
  --brand-sysn:#1f9d63;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  background:var(--bg);
  color:var(--text);
  font-family:"Pretendard","Malgun Gothic","Apple SD Gothic Neo",sans-serif;
  padding:0 0 60px 0;
}
.topbar{
  height:6px;
  background:linear-gradient(90deg,var(--pink1),var(--pink2),var(--blue));
}
.header{
  padding:32px 40px 20px 40px;
  border-bottom:1px solid var(--border);
}
.header h1{
  font-size:26px;
  font-weight:700;
  letter-spacing:-0.3px;
  color:var(--text);
}
.header .sub{
  margin-top:8px;
  color:var(--sub);
  font-size:15px;
  line-height:1.7;
}
.header .sub b{color:var(--text);font-weight:700;}
.container{
  max-width:1200px;
  margin:0 auto;
  padding:24px 40px;
}
.legend{
  display:flex;
  gap:18px;
  flex-wrap:wrap;
  margin-bottom:24px;
  padding:14px 18px;
  background:var(--card2);
  border:1px solid var(--border);
  border-radius:10px;
  font-size:14.5px;
  color:var(--sub);
}
.legend span{display:flex;align-items:center;gap:6px;}
.dot{width:9px;height:9px;border-radius:50%;display:inline-block;}
.dot.up{background:var(--green);}
.dot.down{background:var(--red);}
.dot.new{background:var(--amber);}
.brand-block{
  margin-bottom:14px;
  border:1px solid var(--border);
  border-radius:12px;
  overflow:hidden;
  background:var(--card);
}
.brand-header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:16px 20px;
  cursor:pointer;
  user-select:none;
  background:var(--card2);
}
.brand-header .left{display:flex;align-items:center;gap:12px;}
.brand-tag{
  width:5px;height:22px;border-radius:3px;
}
.brand-header h2{font-size:19px;font-weight:700;color:var(--text);}
.brand-header .meta{font-size:14px;color:var(--sub);}
.chevron{
  width:10px;height:10px;
  border-right:2px solid var(--sub);
  border-bottom:2px solid var(--sub);
  transform:rotate(45deg);
  transition:transform .2s;
}
.brand-block.open > .brand-header .chevron{transform:rotate(-135deg);}
.brand-body{
  max-height:0;
  overflow:hidden;
  transition:max-height .25s ease;
}
.brand-block.open > .brand-body{max-height:20000px;}
.channel-block{
  border-top:1px solid var(--border);
}
.channel-header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:13px 20px 13px 36px;
  cursor:pointer;
  user-select:none;
  background:#fafafc;
}
.channel-header .left{display:flex;align-items:center;gap:10px;}
.channel-header h3{font-size:16.5px;font-weight:600;color:var(--text);}
.channel-header .meta{font-size:13.5px;color:var(--sub);}
.channel-chevron{
  width:8px;height:8px;
  border-right:2px solid var(--sub);
  border-bottom:2px solid var(--sub);
  transform:rotate(45deg);
  transition:transform .2s;
}
.channel-block.open .channel-chevron{transform:rotate(-135deg);}
.channel-body{
  max-height:0;
  overflow:hidden;
  transition:max-height .25s ease;
  background:var(--bg);
}
.channel-block.open .channel-body{max-height:20000px;}
.tables-wrap{
  padding:16px 20px 20px 36px;
}
.table-card{
  border:1px solid var(--border);
  border-radius:10px;
  background:var(--card);
}
.table-scroll{
  overflow-x:auto;
}
.table-card .cap{
  padding:10px 14px;
  font-size:14.5px;
  font-weight:700;
  display:flex;
  align-items:center;
  gap:6px;
  border-bottom:1px solid var(--border);
  color:var(--blue);
}
table{width:100%;min-width:700px;table-layout:fixed;border-collapse:collapse;font-size:14px;}
colgroup col.col-idx{width:6%;}
colgroup col.col-name{width:24%;}
colgroup col.col-f{width:17.5%;}
colgroup col.col-g{width:17.5%;}
colgroup col.col-growth{width:17.5%;}
colgroup col.col-note{width:17.5%;}
th{
  text-align:right;
  padding:9px 10px;
  color:var(--sub);
  font-weight:700;
  font-size:12.5px;
  border-bottom:2px solid var(--border);
  white-space:nowrap;
  position:sticky;
  top:0;
  background:var(--card2);
}
th:first-child, th:nth-child(2){text-align:left;}
th.th-center{text-align:center !important;}
td{
  padding:8px 10px;
  text-align:right;
  border-bottom:1px solid #eeeef2;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
  color:var(--text);
}
td:first-child{text-align:center;color:var(--sub);}
td.name{text-align:left;font-weight:600;white-space:normal;word-break:keep-all;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:#f7f8fb;}
.growth-up{color:var(--green);font-weight:700;}
.growth-down{color:var(--red);font-weight:700;}
.growth-na{color:var(--sub);}
.new-tag{
  font-size:11.5px;
  background:rgba(184,121,15,0.12);
  color:var(--amber);
  padding:1px 6px;
  border-radius:4px;
  margin-left:5px;
  font-weight:700;
  white-space:nowrap;
}
.note-cell{text-align:center !important;}
.note-tag{
  display:inline-block;
  font-size:12.5px;
  background:#eef0f5;
  color:var(--sub);
  padding:2px 9px;
  border-radius:5px;
  font-weight:700;
  white-space:nowrap;
}
.empty-note{
  padding:16px;
  color:var(--sub);
  font-size:14px;
  text-align:center;
}
</style>
</head>

  <div class="sub">

const brandOrder = ["쉬즈미스","리스트","시스티나"];
const brandColor = {"쉬즈미스":"var(--brand-szm)","리스트":"var(--brand-list)","시스티나":"var(--brand-sysn)"};
const channelOrder = ["백화점","아울렛","쇼핑몰","직영가두점","팩토리아울렛","대리점","입점몰","자사몰"];
function fmtNum(v){
  if(v===null||v===undefined) return "-";
  return v.toLocaleString('ko-KR',{minimumFractionDigits:1,maximumFractionDigits:1});
}
function growthCell(g, opendate){
  const isNew = (g===null || g===undefined);
  if(isNew){
    return `<td class="growth-na"><span class="new-tag">신규</span></td>`;
  }
  const cls = g>=0 ? "growth-up" : "growth-down";
  const sign = g>0 ? "+" : "";
  return `<td class="${cls}">${sign}${g.toFixed(1)}%</td>`;
}
function noteCell(note){
  if(!note) return `<td class="note-cell">-</td>`;
  return `<td class="note-cell"><span class="note-tag">${note}</span></td>`;
}
function buildTable(list){
  if(!list || list.length===0){
    return `<div class="table-card"><div class="cap">매장 목록</div><div class="empty-note">해당 없음</div></div>`;
  }
  let rows = list.map((d,i)=>`
<tr>
<td>${i+1}</td>
<td class="name">${d.name}${(d.opendate && new Date(d.opendate) >= new Date('2026-01-01')) ? '<span class="new-tag">신규</span>' : ''}</td>
<td>${fmtNum(d.f)}</td>
<td>${fmtNum(d.g)}</td>
      ${growthCell(d.growth, d.opendate)}
      ${noteCell(d.note)}
</tr>`).join("");
  return `
<div class="table-card">
<div class="cap">전체 ${list.length}개점</div>
<div class="table-scroll">
<table>
<colgroup>
<col class="col-idx"><col class="col-name"><col class="col-f"><col class="col-g"><col class="col-growth"><col class="col-note">
</colgroup>
<thead><tr>
<th>NO.</th><th>매장명</th><th>26년 누계(백만)</th><th>25년 동기(백만)</th><th>신장률</th><th class="th-center">비고</th>
</tr></thead>
<tbody>${rows}</tbody>
</table>
</div>
</div>`;
}
function buildChannel(brand, channel, obj){
  const body = `
<div class="tables-wrap">
      ${buildTable(obj.stores)}
</div>`;
  return `
<div class="channel-block">
<div class="channel-header" onclick="this.parentElement.classList.toggle('open')">
<div class="left">
<span class="channel-chevron"></span>
<h3>${channel}</h3>
</div>
<div class="meta">전체 ${obj.total}개점</div>
</div>
<div class="channel-body">${body}</div>
</div>`;
}
function buildBrand(brand){
  const channels = channelOrder.filter(c => DATA[brand] && DATA[brand][c]);
  const totalStores = channels.reduce((s,c)=>s+DATA[brand][c].total,0);
  const channelHtml = channels.map(c => buildChannel(brand, c, DATA[brand][c])).join("");
  return `
<div class="brand-block">
<div class="brand-header" onclick="this.parentElement.classList.toggle('open')">
<div class="left">
<span class="brand-tag" style="background:${brandColor[brand]}"></span>
<h2>${brand}</h2>
</div>
<div style="display:flex;align-items:center;gap:14px;">
<div class="meta">${channels.length}개 유통망 · 총 ${totalStores}개점</div>
<span class="chevron"></span>
</div>
</div>
<div class="brand-body">${channelHtml}</div>
</div>`;
}
document.getElementById('root').innerHTML = brandOrder.filter(b=>DATA[b]).map(buildBrand).join("");
// open first brand by default
document.querySelector('.brand-block').classList.add('open');
</script>
