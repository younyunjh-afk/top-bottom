<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1~6월 누계 매출 전체 매장 현황</title>
<style>
:root{
  --bg:#ffffff;
  --card:#f7f7f8;
  --card2:#f0f1f4;
  --border:#e2e4ea;
  --text:#111111;
  --sub:#6b7080;
  --blue:#2f6fe0;
  --green:#1f9d67;
  --amber:#c8830a;
  --red:#e0435f;
  --pink1:#ff6fb0;
  --pink2:#8a4fe0;
  --brand-szm:#2f6fe0;
  --brand-list:#ff2f8f;
  --brand-sysn:#1f9d67;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  background:var(--bg);
  color:var(--text);
  font-family:"Pretendard","Malgun Gothic","Apple SD Gothic Neo",sans-serif;
  padding:0 0 60px 0;
}
.topbar{
  height:6px;
  background:linear-gradient(90deg,var(--pink1),var(--pink2),var(--blue));
}
.header{
  padding:32px 40px 20px 40px;
  border-bottom:1px solid var(--border);
}
.header h1{
  font-size:24px;
  font-weight:700;
  letter-spacing:-0.3px;
}
.header .sub{
  margin-top:8px;
  color:var(--sub);
  font-size:13px;
  line-height:1.7;
}
.header .sub b{color:var(--text);font-weight:600;}
.container{
  max-width:1300px;
  margin:0 auto;
  padding:24px 40px;
}
.legend{
  display:flex;
  gap:18px;
  flex-wrap:wrap;
  margin-bottom:24px;
  padding:14px 18px;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:10px;
  font-size:12.5px;
  color:var(--sub);
}
.legend span{display:flex;align-items:center;gap:6px;}
.dot{width:9px;height:9px;border-radius:50%;display:inline-block;}
.dot.up{background:var(--green);}
.dot.down{background:var(--red);}
.dot.new{background:var(--amber);}
.dot.note{background:var(--pink2);}

.summary-caption{
  font-size:12px;
  color:var(--sub);
  font-weight:600;
  margin-bottom:8px;
}
.summary-bar{
  display:flex;
  gap:14px;
  margin-bottom:20px;
  flex-wrap:wrap;
}
.summary-card{
  flex:1;
  min-width:180px;
  padding:18px 22px;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:12px;
}
.summary-card .label{
  font-size:12px;
  color:var(--sub);
  font-weight:600;
  margin-bottom:8px;
}
.summary-card .value{
  font-size:22px;
  font-weight:700;
  letter-spacing:-0.3px;
}
.summary-card .value.growth-up{color:var(--green);}
.summary-card .value.growth-down{color:var(--red);}

.sheet4-wrap{
  margin-bottom:20px;
  border:1px solid var(--border);
  border-radius:12px;
  overflow:hidden;
  background:var(--card);
}
.sheet4-title{
  padding:14px 18px 10px 18px;
  font-size:13px;
  font-weight:700;
  color:var(--text);
}
.sheet4-title .desc{
  font-size:11.5px;
  font-weight:400;
  color:var(--sub);
  margin-left:8px;
}
.sheet4-table{
  width:100%;
  border-collapse:collapse;
  font-size:12.5px;
  background:#fff;
}
.sheet4-table th{
  padding:8px 6px;
  background:var(--card2);
  color:var(--sub);
  font-weight:600;
  text-align:center;
  border-bottom:1px solid var(--border);
  white-space:nowrap;
}
.sheet4-table th:first-child{text-align:left;padding-left:16px;}
.sheet4-table td{
  padding:10px 6px;
  text-align:center;
  border-bottom:1px solid rgba(0,0,0,0.05);
  white-space:nowrap;
}
.sheet4-table tr:last-child td{border-bottom:none;}
.sheet4-table td.growth-up{color:var(--green);font-weight:600;}
.sheet4-table td.growth-down{color:var(--red);font-weight:600;}
.sheet4-table td.growth-na{color:var(--sub);}
.sheet4-table td.sheet4-brand{
  font-weight:700;
  vertical-align:middle;
  background:var(--card);
  border-right:1px solid var(--border);
}
.sheet4-table td.sheet4-year{
  font-weight:500;
  color:var(--sub);
  text-align:center;
  padding-left:6px;
}
.sheet4-table tr.sheet4-brand-end td{
  border-bottom:1px solid var(--border);
}
.sheet4-table tr.sheet4-brand-end td.growth-up,
.sheet4-table tr.sheet4-brand-end td.growth-down{font-weight:700;}

.brand-block{
  margin-bottom:14px;
  border:1px solid var(--border);
  border-radius:12px;
  overflow:hidden;
  background:var(--card);
}
.brand-header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:16px 20px;
  cursor:pointer;
  user-select:none;
}
.brand-header .left{display:flex;align-items:center;gap:12px;}
.brand-tag{
  width:5px;height:22px;border-radius:3px;
}
.brand-header h2{font-size:17px;font-weight:700;}
.chevron{
  width:10px;height:10px;
  border-right:2px solid var(--sub);
  border-bottom:2px solid var(--sub);
  transform:rotate(45deg);
  transition:transform .2s;
}
.brand-block.open > .brand-header .chevron{transform:rotate(-135deg);}
.brand-body{
  max-height:0;
  overflow:hidden;
  transition:max-height .25s ease;
}
.brand-block.open > .brand-body{max-height:200000px;}

.channel-block{
  border-top:1px solid var(--border);
}
.channel-header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:13px 20px 13px 36px;
  cursor:pointer;
  user-select:none;
  background:var(--card2);
}
.channel-header .left{display:flex;align-items:center;gap:10px;}
.channel-header h3{font-size:14.5px;font-weight:600;}
.channel-header .meta{font-size:11.5px;color:var(--sub);}
.channel-chevron{
  width:8px;height:8px;
  border-right:2px solid var(--sub);
  border-bottom:2px solid var(--sub);
  transform:rotate(45deg);
  transition:transform .2s;
}
.channel-block.open .channel-chevron{transform:rotate(-135deg);}
.channel-body{
  max-height:0;
  overflow:hidden;
  transition:max-height .25s ease;
  background:var(--bg);
}
.channel-block.open .channel-body{max-height:80000px;}

.group-block{
  border-top:1px solid var(--border);
}
.group-header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:10px 20px 10px 52px;
  cursor:pointer;
  user-select:none;
  background:var(--bg);
}
.group-header .left{display:flex;align-items:center;gap:9px;}
.group-header h4{font-size:13px;font-weight:600;color:var(--text);}
.group-header .meta{font-size:11px;color:var(--sub);}
.group-chevron{
  width:7px;height:7px;
  border-right:2px solid var(--sub);
  border-bottom:2px solid var(--sub);
  transform:rotate(45deg);
  transition:transform .2s;
}
.group-block.open .group-chevron{transform:rotate(-135deg);}
.group-body{
  max-height:0;
  overflow:hidden;
  transition:max-height .25s ease;
}
.group-block.open .group-body{max-height:40000px;}

.table-wrap{
  padding:12px 20px 18px 52px;
}
table{width:100%;table-layout:fixed;border-collapse:collapse;font-size:12.5px;}
th{
  text-align:right;
  padding:8px 10px;
  color:var(--sub);
  font-weight:600;
  font-size:11px;
  border-bottom:1px solid var(--border);
  position:sticky;
  top:0;
  background:var(--bg);
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}
th:first-child, th:nth-child(2){text-align:left;}
th:nth-child(3){text-align:center;}
th:last-child{text-align:center;}
td{
  padding:7px 10px;
  text-align:right;
  border-bottom:1px solid rgba(0,0,0,0.06);
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
td:first-child{text-align:center;color:var(--sub);}
td.code{text-align:left;color:var(--sub);font-size:11.5px;}
td.name{text-align:center;font-weight:500;white-space:normal;word-break:keep-all;}
td.note-cell{text-align:center;white-space:normal;word-break:keep-all;}
td.growth-up,td.growth-down,td.growth-na{overflow:visible;text-overflow:clip;white-space:nowrap;}
tr:last-child td{border-bottom:none;}
tr.has-note{background:rgba(160,107,255,0.06);}
.growth-up{color:var(--green);font-weight:600;}
.growth-down{color:var(--red);font-weight:600;}
.growth-na{color:var(--sub);}
.note-tag{
  font-size:10px;
  padding:2px 7px;
  border-radius:5px;
  font-weight:600;
  white-space:nowrap;
  display:inline-block;
}
</style>
</head>

  <h1>1~6월 누계 매출 전체 매장 현황</h1>

</div>

    "복합매장": ["rgba(91,155,247,0.15)", "var(--blue)"],
    "무인매장": ["rgba(245,185,66,0.15)", "var(--amber)"],
    "26년도 오픈": ["rgba(55,211,153,0.15)", "var(--green)"],
    "당해년도 오픈": ["rgba(55,211,153,0.15)", "var(--green)"],
    "오픈 1년 미만": ["rgba(55,211,153,0.15)", "var(--green)"],
    "폐점진행": ["rgba(247,107,138,0.15)", "var(--red)"],
    "회생": ["rgba(160,107,255,0.15)", "var(--pink2)"],
    "기타매장": ["rgba(0,0,0,0.06)", "var(--sub)"],
    "6월 폐점완료": ["rgba(247,107,138,0.15)", "var(--red)"],
    "7월 폐점": ["rgba(247,107,138,0.15)", "var(--red)"],
    "8월 폐점": ["rgba(247,107,138,0.15)", "var(--red)"],
    "9월 폐점": ["rgba(247,107,138,0.15)", "var(--red)"],
    "9월 폐점(정상재고 출고)": ["rgba(247,107,138,0.15)", "var(--red)"],
    "26년 하반기 폐점대상": ["rgba(247,107,138,0.15)", "var(--red)"],
    "신상 미출고": ["rgba(200,131,10,0.15)", "var(--amber)"],
    "FW시즌 150pcs이하": ["rgba(200,131,10,0.15)", "var(--amber)"],
    "FW시즌 200pcs이하": ["rgba(200,131,10,0.15)", "var(--amber)"],
    "FW시즌 500pcs 이하": ["rgba(200,131,10,0.15)", "var(--amber)"]
  };
  const [bg, fg] = colors[note] || ["rgba(0,0,0,0.06)", "var(--sub)"];
  return `<span class="note-tag" style="background:${bg};color:${fg};">${note}</span>`;
}

function growthSpan(g){
  if(g===null||g===undefined) return `<span class="growth-na">-</span>`;
  const cls = g>=0 ? "growth-up" : "growth-down";
  const sign = g>0 ? "+" : "";
  return `<span class="${cls}">${sign}${g.toFixed(1)}%</span>`;
}
function sumStats(stores){
  let sumF=0, sumG=0, hasG=false;
  stores.forEach(d=>{
    if(d.f!=null) sumF += d.f;
    if(d.g!=null){ sumG += d.g; hasG=true; }
  });
  const growth = (hasG && sumG>0) ? (sumF-sumG)/sumG*100 : null;
  return {f:sumF, g:hasG?sumG:null, growth};
}

function buildChannelTable(stores){
  let rows = stores.map((d,i)=>`
    <tr class="${d.note ? 'has-note' : ''}">
      <td>${i+1}</td>
      <td class="code">${d.code}</td>
      <td class="name">${d.name}</td>
      <td>${fmtPct(d.distmargin)}</td>
      <td>${fmtPct(d.midmargin)}</td>
      <td>${fmtPct(d.totmargin)}</td>
      <td>${fmtNum(d.f)}</td>
      <td>${fmtNum(d.g)}</td>
      ${growthCell(d.growth)}
      <td class="note-cell">${noteTag(d.note)}</td>
    </tr>`).join("");
  return `
    <table>
      <colgroup>
        <col style="width:4%">
        <col style="width:9%">
        <col style="width:14%">
        <col style="width:9%">
        <col style="width:9%">
        <col style="width:9%">
        <col style="width:12%">
        <col style="width:12%">
        <col style="width:11%">
        <col style="width:11%">
      </colgroup>
      <thead><tr>
        <th>No.</th><th>코드</th><th>매장명</th><th>유통마진</th><th>중간관리</th><th>총 마진</th><th>26년 누계(백만)</th><th>25년 동기(백만)</th><th>신장률</th><th>비고</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

function buildGroup(group){
  const st = sumStats(group.stores);
  return `
  <div class="group-block">
    <div class="group-header" onclick="event.stopPropagation();this.parentElement.classList.toggle('open')">
      <div class="left">
        <span class="group-chevron"></span>
        <h4>${group.name}</h4>
      </div>
      <div class="meta">26년 누계 ${fmtNum(st.f)}백만 · 25년 동기 ${fmtNum(st.g)}백만 · 신장률 ${growthSpan(st.growth)}</div>
    </div>
    <div class="group-body"><div class="table-wrap">${buildChannelTable(group.stores)}</div></div>
  </div>`;
}

function buildChannel(brand, channel, obj){
  const allStores = obj.groups.flatMap(g => g.stores);
  const st = sumStats(allStores);
  const groupHtml = obj.groups.map(buildGroup).join("");
  return `
  <div class="channel-block">
    <div class="channel-header" onclick="this.parentElement.classList.toggle('open')">
      <div class="left">
        <span class="channel-chevron"></span>
        <h3>${channel}</h3>
      </div>
      <div class="meta">26년 누계 ${fmtNum(st.f)}백만 · 25년 동기 ${fmtNum(st.g)}백만 · 신장률 ${growthSpan(st.growth)}</div>
    </div>
    <div class="channel-body">${groupHtml}</div>
  </div>`;
}

function buildBrand(brand){
  const channels = channelOrder.filter(c => DATA[brand] && DATA[brand][c]);
  const allStores = channels.flatMap(c => DATA[brand][c].groups.flatMap(g => g.stores));
  const st = sumStats(allStores);
  const channelHtml = channels.map(c => buildChannel(brand, c, DATA[brand][c])).join("");
  return `
  <div class="brand-block">
    <div class="brand-header" onclick="this.parentElement.classList.toggle('open')">
      <div class="left">
        <span class="brand-tag" style="background:${brandColor[brand]}"></span>
        <h2>${brand}</h2>
      </div>
      <div style="display:flex;align-items:center;gap:14px;">
        <div class="meta">26년 누계 ${fmtNum(st.f)}백만 · 25년 동기 ${fmtNum(st.g)}백만 · 신장률 ${growthSpan(st.growth)}</div>
        <span class="chevron"></span>
      </div>
    </div>
    <div class="brand-body">${channelHtml}</div>
  </div>`;
}

function renderSummaryBar(){
  // 1~6 전년비 시트 K열(총합계) 기준 고정값
  const TOTAL_2026 = 158679938027;
  const TOTAL_2025 = 175082718235;
  const f = TOTAL_2026 / 1000000;
  const g = TOTAL_2025 / 1000000;
  const growth = (TOTAL_2026 - TOTAL_2025) / TOTAL_2025 * 100;
  const growthCls = growth>=0 ? 'growth-up' : 'growth-down';
  const growthTxt = (growth>0?'+':'') + growth.toFixed(1) + '%';
  document.getElementById('summary-bar').innerHTML = `
    <div class="summary-card">
      <div class="label">전체 매출 (26년 1~6월 누계)</div>
      <div class="value">${fmtNum(f)}백만</div>
    </div>
    <div class="summary-card">
      <div class="label">전년 매출 (25년 동기간)</div>
      <div class="value">${fmtNum(g)}백만</div>
    </div>
    <div class="summary-card">
      <div class="label">신장률</div>
      <div class="value ${growthCls}">${growthTxt}</div>
    </div>`;
}

document.getElementById('root').innerHTML = '<div class="summary-caption" style="margin:0 0 10px;color:#111111;font-size:14px;">폐점, 특판 제외</div>' + brandOrder.filter(b=>DATA[b]).map(buildBrand).join("");
document.querySelector('.brand-block').classList.add('open');
renderSummaryBar();

function sheet4NumCell(v){
  if(v===null||v===undefined) return `<td class="growth-na">-</td>`;
  return `<td>${Math.round(v).toLocaleString('ko-KR')}</td>`;
}
function sheet4GrowthCell(g){
  if(g===null||g===undefined) return `<td class="growth-na">-</td>`;
  const cls = g>=0 ? "growth-up" : "growth-down";
  const sign = g>0 ? "+" : "";
  return `<td class="${cls}">${sign}${g.toFixed(1)}%</td>`;
}
function renderSheet4(){
  const heads = SHEET4.channels.map(c=>`<th>${c}</th>`).join("");
  const bodyRows = SHEET4.brands.map(b=>{
    const row = SHEET4.data[b];
    const r26 = row.y2026.map(sheet4NumCell).join("");
    const r25 = row.y2025.map(sheet4NumCell).join("");
    const rGr = row.growth.map(sheet4GrowthCell).join("");
    return `
    <tr class="sheet4-brand-start"><td rowspan="3" class="sheet4-brand">${b}</td><td class="sheet4-year">26년</td>${r26}</tr>
    <tr><td class="sheet4-year">25년</td>${r25}</tr>
    <tr class="sheet4-brand-end"><td class="sheet4-year">전년비</td>${rGr}</tr>`;
  }).join("");
  document.getElementById('sheet4-section').innerHTML = `
  <div class="sheet4-wrap">
    <div class="sheet4-title">브랜드 × 유통망 전년비 신장률<span class="desc">Sheet4 기준 · 매출 단위 백만원 · 전년비 = (26년−25년)/25년</span></div>
    <div class="table-wrap">
      <table class="sheet4-table">
        <thead><tr><th>브랜드</th><th>년도</th>${heads}</tr></thead>
        <tbody>${bodyRows}</tbody>
      </table>
    </div>
  </div>`;
}
renderSheet4();
</script>
</body>
</html>
