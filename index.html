<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1~6월 누계 매출 상위·하위 매장 현황</title>
<style>
:root{
  --bg:#0b0e18;
  --card:#161b2c;
  --card2:#1c2236;
  --border:#252c42;
  --text:#e8ebf5;
  --sub:#8890a8;
  --blue:#5b9bf7;
  --green:#37d399;
  --amber:#f5b942;
  --red:#f76b8a;
  --pink1:#ff6fb0;
  --pink2:#a06bff;
  --brand-szm:#5b9bf7;
  --brand-list:#ff6fb0;
  --brand-sysn:#37d399;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  background:var(--bg);
  color:var(--text);
  font-family:"Pretendard","Malgun Gothic","Apple SD Gothic Neo",sans-serif;
  padding:0 0 60px 0;
}
.topbar{
  height:6px;
  background:linear-gradient(90deg,var(--pink1),var(--pink2),var(--blue));
}
.header{
  padding:32px 40px 20px 40px;
  border-bottom:1px solid var(--border);
}
.header h1{
  font-size:24px;
  font-weight:700;
  letter-spacing:-0.3px;
}
.header .sub{
  margin-top:8px;
  color:var(--sub);
  font-size:13px;
  line-height:1.7;
}
.header .sub b{color:var(--text);font-weight:600;}
.container{
  max-width:1200px;
  margin:0 auto;
  padding:24px 40px;
}
.legend{
  display:flex;
  gap:18px;
  flex-wrap:wrap;
  margin-bottom:24px;
  padding:14px 18px;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:10px;
  font-size:12.5px;
  color:var(--sub);
}
.legend span{display:flex;align-items:center;gap:6px;}
.dot{width:9px;height:9px;border-radius:50%;display:inline-block;}
.dot.up{background:var(--green);}
.dot.down{background:var(--red);}
.dot.new{background:var(--amber);}

.brand-block{
  margin-bottom:14px;
  border:1px solid var(--border);
  border-radius:12px;
  overflow:hidden;
  background:var(--card);
}
.brand-header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:16px 20px;
  cursor:pointer;
  user-select:none;
}
.brand-header .left{display:flex;align-items:center;gap:12px;}
.brand-tag{
  width:5px;height:22px;border-radius:3px;
}
.brand-header h2{font-size:17px;font-weight:700;}
.brand-header .meta{font-size:12px;color:var(--sub);}
.chevron{
  width:10px;height:10px;
  border-right:2px solid var(--sub);
  border-bottom:2px solid var(--sub);
  transform:rotate(45deg);
  transition:transform .2s;
}
.brand-block.open > .brand-header .chevron{transform:rotate(-135deg);}
.brand-body{
  max-height:0;
  overflow:hidden;
  transition:max-height .25s ease;
}
.brand-block.open > .brand-body{max-height:20000px;}

.channel-block{
  border-top:1px solid var(--border);
}
.channel-header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:13px 20px 13px 36px;
  cursor:pointer;
  user-select:none;
  background:var(--card2);
}
.channel-header .left{display:flex;align-items:center;gap:10px;}
.channel-header h3{font-size:14.5px;font-weight:600;}
.channel-header .meta{font-size:11.5px;color:var(--sub);}
.channel-chevron{
  width:8px;height:8px;
  border-right:2px solid var(--sub);
  border-bottom:2px solid var(--sub);
  transform:rotate(45deg);
  transition:transform .2s;
}
.channel-block.open .channel-chevron{transform:rotate(-135deg);}
.channel-body{
  max-height:0;
  overflow:hidden;
  transition:max-height .25s ease;
  background:var(--bg);
}
.channel-block.open .channel-body{max-height:6000px;}

.tables-wrap{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:16px;
  padding:16px 20px 20px 36px;
}
@media(max-width:820px){.tables-wrap{grid-template-columns:1fr;}}

.table-card{
  border:1px solid var(--border);
  border-radius:10px;
  overflow:hidden;
  background:var(--card);
}
.table-card .cap{
  padding:10px 14px;
  font-size:12.5px;
  font-weight:700;
  display:flex;
  align-items:center;
  gap:6px;
  border-bottom:1px solid var(--border);
}
.table-card.top .cap{color:var(--green);}
.table-card.bottom .cap{color:var(--red);}
table{width:100%;border-collapse:collapse;font-size:12.5px;}
th{
  text-align:right;
  padding:8px 10px;
  color:var(--sub);
  font-weight:600;
  font-size:11px;
  border-bottom:1px solid var(--border);
}
th:first-child, th:nth-child(2){text-align:left;}
td{
  padding:8px 10px;
  text-align:right;
  border-bottom:1px solid rgba(255,255,255,0.04);
  white-space:nowrap;
}
td:first-child{text-align:center;color:var(--sub);width:24px;}
td.name{text-align:left;font-weight:500;}
tr:last-child td{border-bottom:none;}
.growth-up{color:var(--green);font-weight:600;}
.growth-down{color:var(--red);font-weight:600;}
.growth-na{color:var(--sub);}
.new-tag{
  font-size:9.5px;
  background:rgba(245,185,66,0.15);
  color:var(--amber);
  padding:1px 5px;
  border-radius:4px;
  margin-left:5px;
  font-weight:600;
}
.empty-note{
  padding:16px;
  color:var(--sub);
  font-size:12px;
  text-align:center;
}
</style>
</head>
<body>
<div class="topbar"></div>
<div class="header">
  <h1>1~6월 누계 매출 상위 · 하위 7개점 현황</h1>
  <div class="sub">
    기준 시트: <b>1~6누계 신장률</b> · 브랜드 → 유통망 → 코드(매장) 기준 F열(26년 1~6월 누계 매출) 상위 7개점 / 하위 7개점 선정<br>
    매출 단위 <b>백만원</b> · 신장률 = <b>(F − G) / G</b> (F: 26년 1~6월 누계, G: 25년 동기간 매출)<br>
    하위 7개점 선정 제외 대상: <b>26년 1월 1일 이후 오픈 매장</b>, 비고란 <b>복합매장·무인매장·26년도 오픈</b> 표기 매장
  </div>
</div>
<div class="container">
  <div class="legend">
    <span><span class="dot up"></span>신장률 플러스(전년比 성장)</span>
    <span><span class="dot down"></span>신장률 마이너스(전년比 역신장)</span>
    <span><span class="dot new"></span>신규 오픈 매장(전년 동기 매출 없음, N/A)</span>
  </div>
  <div id="root"></div>
</div>

const brandOrder = ["쉬즈미스","리스트","시스티나"];
const brandColor = {"쉬즈미스":"var(--brand-szm)","리스트":"var(--brand-list)","시스티나":"var(--brand-sysn)"};
const channelOrder = ["백화점","아울렛","쇼핑몰","직영가두점","팩토리아울렛","대리점","입점몰","자사몰"];

function fmtNum(v){
  if(v===null||v===undefined) return "-";
  return v.toLocaleString('ko-KR',{minimumFractionDigits:1,maximumFractionDigits:1});
}
function growthCell(g, opendate){
  const isNew = (g===null || g===undefined);
  if(isNew){
    return `<td class="growth-na">N/A<span class="new-tag">신규</span></td>`;
  }
  const cls = g>=0 ? "growth-up" : "growth-down";
  const sign = g>0 ? "+" : "";
  return `<td class="${cls}">${sign}${g.toFixed(1)}%</td>`;
}

function buildTable(list, type){
  if(!list || list.length===0){
    return `<div class="table-card ${type}"><div class="cap">${type==='top'?'▲ 상위 7개점':'▼ 하위 7개점'}</div><div class="empty-note">해당 없음 (표본 부족 또는 전 매장 상위 선정)</div></div>`;
  }
  let rows = list.map((d,i)=>`
    <tr>
      <td>${i+1}</td>
      <td class="name">${d.name}${(new Date(d.opendate) >= new Date('2026-01-01')) ? '<span class="new-tag">신규</span>' : ''}</td>
      <td>${fmtNum(d.f)}</td>
      <td>${fmtNum(d.g)}</td>
      ${growthCell(d.growth, d.opendate)}
    </tr>`).join("");
  return `
  <div class="table-card ${type}">
    <div class="cap">${type==='top'?'▲ 상위 '+list.length+'개점':'▼ 하위 '+list.length+'개점'}</div>
    <table>
      <thead><tr>
        <th>#</th><th>매장명</th><th>26년 누계(백만)</th><th>25년 동기(백만)</th><th>신장률</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`;
}

function buildChannel(brand, channel, obj){
  const body = `
    <div class="tables-wrap">
      ${buildTable(obj.top, 'top')}
      ${buildTable(obj.bottom, 'bottom')}
    </div>`;
  return `
  <div class="channel-block">
    <div class="channel-header" onclick="this.parentElement.classList.toggle('open')">
      <div class="left">
        <span class="channel-chevron"></span>
        <h3>${channel}</h3>
      </div>
      <div class="meta">전체 ${obj.total}개점 · 상위 ${obj.top.length} · 하위 ${obj.bottom.length}</div>
    </div>
    <div class="channel-body">${body}</div>
  </div>`;
}

function buildBrand(brand){
  const channels = channelOrder.filter(c => DATA[brand] && DATA[brand][c]);
  const totalStores = channels.reduce((s,c)=>s+DATA[brand][c].total,0);
  const channelHtml = channels.map(c => buildChannel(brand, c, DATA[brand][c])).join("");
  return `
  <div class="brand-block">
    <div class="brand-header" onclick="this.parentElement.classList.toggle('open')">
      <div class="left">
        <span class="brand-tag" style="background:${brandColor[brand]}"></span>
        <h2>${brand}</h2>
      </div>
      <div style="display:flex;align-items:center;gap:14px;">
        <div class="meta">${channels.length}개 유통망 · 총 ${totalStores}개점</div>
        <span class="chevron"></span>
      </div>
    </div>
    <div class="brand-body">${channelHtml}</div>
  </div>`;
}

document.getElementById('root').innerHTML = brandOrder.filter(b=>DATA[b]).map(buildBrand).join("");
// open first brand by default
document.querySelector('.brand-block').classList.add('open');
</script>
